name: Build Native Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Native Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 24
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "24"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Linux native image
        run: ./gradlew :app:nativeCompile --no-configuration-cache

      - name: Package Linux binary
        run: |
          mkdir -p dist/linux
          cp app/build/native/nativeCompile/abrechnung dist/linux/
          cd dist/linux
          tar czf ../../abrechnung-linux-x64-${{ github.ref_name }}.tar.gz abrechnung

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: abrechnung-linux-x64
          path: app/build/native/nativeCompile/abrechnung
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: abrechnung-linux-x64-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Native Image
    runs-on: windows-2025
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 24
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "24"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Windows installer
        shell: cmd
        run: gradlew.bat :app:buildInstaller -Pversion="${{ github.ref_name }}" --no-configuration-cache

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: abrechnung-windows-x64
          path: app/build/distributions/*.exe
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/distributions/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    name: Build macOS Native Image (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 24
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "24"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build macOS ARM64 native image
        run: ./gradlew :app:nativeCompile --no-configuration-cache

      - name: Package macOS ARM64 binary
        run: |
          mkdir -p dist/macos-arm64
          cp app/build/native/nativeCompile/abrechnung dist/macos-arm64/
          cd dist/macos-arm64
          tar czf ../../abrechnung-macos-arm64-${{ github.ref_name }}.tar.gz abrechnung

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: abrechnung-macos-arm64
          path: app/build/native/nativeCompile/abrechnung
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: abrechnung-macos-arm64-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-x64:
    name: Build macOS Native Image (Intel)
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 24
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "24"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build macOS x64 native image
        run: ./gradlew :app:nativeCompile --no-configuration-cache

      - name: Package macOS x64 binary
        run: |
          mkdir -p dist/macos-x64
          cp app/build/native/nativeCompile/abrechnung dist/macos-x64/
          cd dist/macos-x64
          tar czf ../../abrechnung-macos-x64-${{ github.ref_name }}.tar.gz abrechnung

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: abrechnung-macos-x64
          path: app/build/native/nativeCompile/abrechnung
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: abrechnung-macos-x64-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
